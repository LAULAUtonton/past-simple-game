<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Simple vs Past Continuous</title>

<style>
body { font-family: Arial; margin:0; background:#eef6ff;}
.container { max-width:1000px; margin:auto; padding:20px;}
.card { background:white; padding:20px; border-radius:15px; margin-bottom:20px;}
button { padding:10px 15px; margin:5px; border:none; border-radius:10px; cursor:pointer;}
.primary { background:#2563eb; color:white;}
.choice { background:#eee;}
.correct { background:#a7f3d0;}
.wrong { background:#fecaca;}
.hidden { display:none;}
iframe { width:100%; height:300px;}
.word { background:#ddd; margin:5px; padding:8px 12px; border-radius:10px; cursor:pointer;}
.built { min-height:60px; border:2px dashed #999; padding:10px; margin:10px 0;}
</style>
</head>

<body>
<div class="container">

<!-- INTRO -->
<div class="card" id="intro">
<h1>Past Simple vs Past Continuous</h1>

<p><b>Rule:</b> Long action = was/were + ing | Short action = past simple</p>

<iframe src="https://www.youtube.com/embed/nFQ7_LhVtv4" allowfullscreen></iframe>

<p><a href="https://www.youtube.com/watch?v=nFQ7_LhVtv4" target="_blank">Open video</a></p>

<img src="https://i.imgur.com/ulbC2XO.png" width="100%">
<p>He was watching TV when the phone rang.</p>

<button class="primary" onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
<h3 id="round"></h3>
<h2 id="question"></h2>

<div id="choices"></div>

<div id="orderArea" class="hidden">
<div class="built" id="built"></div>
<div id="words"></div>
<button onclick="checkOrder()">Check</button>
</div>

<p id="feedback"></p>
<button class="primary hidden" id="next" onclick="next()">Next</button>
</div>

<!-- END -->
<div class="card hidden" id="end">
<h2>Finished</h2>
<h1 id="score"></h1>
<button onclick="restart()">Restart</button>
</div>

</div>

<script>

const rounds = [

{
name:"Round 1",
type:"choice",
data:[
{q:"I ___ dinner when the phone rang.", a:["cooked","was cooking"], c:"was cooking"},
{q:"We ___ football when it started to rain.", a:["played","were playing"], c:"were playing"}
]
},

{
name:"Round 2",
type:"choice",
data:[
{q:"Correct?", a:["He was sleeping when alarm rang","He slept when alarm was ringing"], c:"He was sleeping when alarm rang"},
{q:"Correct?", a:["I was walking when I saw him","I walked when I was seeing him"], c:"I was walking when I saw him"}
]
},

{
name:"Round 3",
type:"order",
data:[
{q:"Order:", words:["I","was","cooking","when","phone","rang"], answer:"I was cooking when phone rang"},
{q:"Order:", words:["they","were","playing","when","it","started"], answer:"they were playing when it started"}
]
}

];

let r=0,q=0,score=0,selected=[];

function startGame(){
intro.classList.add("hidden");
game.classList.remove("hidden");
load();
}

function load(){
let item=rounds[r].data[q];
round.textContent=rounds[r].name;
question.textContent=item.q;
feedback.textContent="";
nextBtn.classList.add("hidden");

choices.innerHTML="";
orderArea.classList.add("hidden");
selected=[];

if(rounds[r].type==="choice"){
item.a.forEach(x=>{
let b=document.createElement("button");
b.textContent=x;
b.className="choice";
b.onclick=()=>check(x,b);
choices.appendChild(b);
});
}

if(rounds[r].type==="order"){
orderArea.classList.remove("hidden");
words.innerHTML="";
built.innerHTML="";

item.words.forEach(w=>{
let b=document.createElement("span");
b.textContent=w;
b.className="word";
b.onclick=()=>{
selected.push(w);
b.style.opacity=0.3;
updateBuilt();
};
words.appendChild(b);
});
}
}

function updateBuilt(){
built.innerHTML=selected.join(" ");
}

function check(choice,btn){
let item=rounds[r].data[q];
document.querySelectorAll(".choice").forEach(b=>b.disabled=true);

if(choice===item.c){
btn.classList.add("correct");
score++;
feedback.textContent="Correct!";
}else{
btn.classList.add("wrong");
feedback.textContent="Wrong! Correct: "+item.c;
}

showNext();
}

function checkOrder(){
let item=rounds[r].data[q];
let ans=selected.join(" ");

if(ans===item.answer){
score++;
feedback.textContent="Correct!";
}else{
feedback.textContent="Wrong! "+item.answer;
}

showNext();
}

function showNext(){
next.classList.remove("hidden");
if(r===rounds.length-1 && q===rounds[r].data.length-1){
next.textContent="Finish";
}
}

function next(){
if(q<rounds[r].data.length-1){
q++;
}else if(r<rounds.length-1){
r++; q=0;
}else{
endGame(); return;
}
load();
}

function endGame(){
game.classList.add("hidden");
end.classList.remove("hidden");
scoreEl.textContent=score+"/"+total();
}

function total(){
let t=0;
rounds.forEach(r=>t+=r.data.length);
return t;
}

function restart(){
r=0;q=0;score=0;
end.classList.add("hidden");
intro.classList.remove("hidden");
}

const intro=document.getElementById("intro");
const game=document.getElementById("game");
const end=document.getElementById("end");
const round=document.getElementById("round");
const question=document.getElementById("question");
const choices=document.getElementById("choices");
const feedback=document.getElementById("feedback");
const next=document.getElementById("next");
const words=document.getElementById("words");
const built=document.getElementById("built");
const orderArea=document.getElementById("orderArea");
const scoreEl=document.getElementById("score");

</script>

</body>
</html>
